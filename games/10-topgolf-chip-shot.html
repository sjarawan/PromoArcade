<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Chip Shot — Topgolf</title>
<meta name="description" content="Power up and aim for the target. A Topgolf-inspired mini-game."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--blue:#0B3D91;--blue-light:#1E5FC4;--green:#3EA546;--green-dark:#1F6B26;--orange:#F47A20;--white:#FFF;--dark:#0A1828}
  html,body{height:100%;overflow:hidden;background:var(--blue);font-family:'Montserrat',sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  #game{position:fixed;inset:0;overflow:hidden;background:linear-gradient(180deg,#0B3D91 0%,#1E5FC4 50%,#3EA546 50.1%,#1F6B26 100%);cursor:pointer}
  #hud{position:absolute;top:0;left:0;right:0;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;z-index:5;pointer-events:none}
  .brand{background:var(--white);padding:8px 16px;border-radius:6px;border:3px solid var(--blue);box-shadow:0 4px 12px rgba(11,61,145,.3)}
  .brand-name{font-weight:900;font-size:16px;color:var(--blue);line-height:1;letter-spacing:1px}
  .brand-sub{font-size:9px;color:var(--orange);font-weight:800;letter-spacing:2px;margin-top:2px}
  .score-box{background:var(--blue);color:var(--white);padding:8px 18px;border-radius:6px;text-align:right;border:3px solid var(--orange)}
  .score-lbl{font-size:10px;letter-spacing:2px;font-weight:700;line-height:1}
  .score-val{font-size:24px;font-weight:900;line-height:1.1;color:var(--orange)}
  .target{position:absolute;will-change:left,top;z-index:2}
  .target-ring{width:80px;height:80px;border-radius:50%;border:4px solid var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3)}
  .target-ring::before{content:'';width:50px;height:50px;border-radius:50%;border:4px solid var(--orange);display:flex;align-items:center;justify-content:center}
  .target-ring::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:var(--orange);box-shadow:0 0 16px var(--orange)}
  .target-label{text-align:center;color:var(--white);font-size:10px;font-weight:800;letter-spacing:2px;margin-top:4px;text-shadow:0 2px 4px rgba(0,0,0,.5)}
  #ball{position:absolute;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,#DDD);box-shadow:0 3px 8px rgba(0,0,0,.4);will-change:transform;z-index:3}
  #ball::before{content:'';position:absolute;inset:2px;border-radius:50%;background-image:radial-gradient(circle at 20% 20%,transparent 30%,#BBB 30.5%,transparent 33%),radial-gradient(circle at 60% 30%,transparent 30%,#BBB 30.5%,transparent 33%),radial-gradient(circle at 30% 70%,transparent 30%,#BBB 30.5%,transparent 33%);opacity:.4}
  #tee{position:absolute;bottom:40px;left:30px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:42px;z-index:3;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
  .meters{position:absolute;bottom:20px;left:20px;right:20px;display:flex;gap:8px;z-index:4}
  .meter{flex:1;height:18px;background:rgba(255,255,255,.2);border-radius:9px;overflow:hidden;border:2px solid var(--white);position:relative}
  .meter-lbl{position:absolute;top:-16px;left:0;font-size:9px;font-weight:800;color:var(--white);letter-spacing:1px;text-shadow:0 1px 2px rgba(0,0,0,.6)}
  .meter-fill{height:100%;border-radius:7px;transition:none}
  .mp .meter-fill{background:linear-gradient(90deg,#FFD54F,var(--orange),#E64A19)}
  .ma .meter-fill{background:linear-gradient(90deg,#4FC3F7,#fff,#4FC3F7)}
  .instr{position:absolute;top:80px;left:0;right:0;text-align:center;color:var(--white);font-size:13px;font-weight:800;letter-spacing:2px;z-index:4;text-shadow:0 2px 4px rgba(0,0,0,.6)}
  .burst{position:absolute;font-size:40px;font-weight:900;color:var(--orange);pointer-events:none;animation:burst 1.2s forwards;z-index:10;text-shadow:0 3px 8px rgba(0,0,0,.6);letter-spacing:2px}
  @keyframes burst{0%{transform:scale(.5);opacity:0}20%{transform:scale(1.2);opacity:1}80%{opacity:1}100%{transform:scale(1) translateY(-40px);opacity:0}}
  .screen{position:absolute;inset:0;background:rgba(10,24,40,.95);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:20;padding:20px}
  .screen.hidden{display:none}
  .panel{background:var(--white);border-top:6px solid var(--orange);border-radius:8px;padding:32px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.5)}
  .tag{font-size:11px;letter-spacing:4px;color:var(--orange);font-weight:900;text-transform:uppercase}
  .title{font-weight:900;font-size:44px;color:var(--blue);line-height:1;margin:8px 0;letter-spacing:-1px}
  .title em{font-style:normal;color:var(--orange)}
  .desc{font-size:14px;color:#3A4A5A;line-height:1.5;margin-bottom:22px;font-weight:500}
  .btn{background:var(--orange);color:var(--white);border:none;padding:14px 40px;font-size:15px;font-weight:900;letter-spacing:2px;cursor:pointer;border-radius:6px;transition:transform .1s;box-shadow:0 5px 0 #C85E10}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #C85E10}
  .btn.outline{background:transparent;color:var(--blue);border:2px solid var(--blue);margin-top:10px;padding:10px 28px;font-size:13px;box-shadow:none}
  .final-score{font-weight:900;font-size:80px;color:var(--orange);line-height:1}
  .final-lbl{font-size:11px;letter-spacing:3px;color:var(--blue);margin:8px 0;font-weight:800}
  .logo-slot{width:80px;height:80px;background:var(--blue);border-radius:12px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:44px;border:4px solid var(--orange)}
  .shots-info{font-size:12px;color:var(--blue);font-weight:700;margin-bottom:14px}
</style>
<script src="fx.js" defer></script>
</head>
<body>
<div id="game">
  <div id="hud">
    <div class="brand">
      <div class="brand-name">TOPGOLF</div>
      <div class="brand-sub">PLAY. EAT. DRINK.</div>
    </div>
    <div class="score-box">
      <div class="score-lbl">POINTS</div>
      <div class="score-val" id="score">0</div>
    </div>
  </div>
  <div class="instr" id="instr" style="top:80px">TAP TO SET POWER · TAP TO SET AIM · WATCH IT FLY</div>
  <div class="target" id="target">
    <div class="target-ring"></div>
    <div class="target-label" id="targetLabel">50 PTS</div>
  </div>
  <div id="tee">⛳</div>
  <div id="ball" style="display:none"></div>
  <div class="meters">
    <div class="meter mp"><div class="meter-lbl">POWER</div><div class="meter-fill" id="powerFill"></div></div>
    <div class="meter ma"><div class="meter-lbl">AIM</div><div class="meter-fill" id="aimFill"></div></div>
  </div>

  <div class="screen" id="start">
    <div class="panel">
      <!-- LOGO SLOT: Replace with <img src="../assets/logos/topgolf.png"> -->
      <div class="logo-slot">⛳</div>
      <div class="tag">TOPGOLF</div>
      <h1 class="title">Chip <em>Shot</em></h1>
      <p class="desc">Tap once to lock your power. Tap again to lock your aim. Hit the bullseye for max points! You get <b>5 shots</b> — how high can you score?</p>
      <button class="btn" onclick="start()">TEE OFF</button>
    </div>
  </div>

  <div class="screen hidden" id="over">
    <div class="panel">
      <div class="final-lbl">FINAL SCORE</div>
      <div class="final-score" id="finalScore">0</div>
      <div class="shots-info" id="shotsInfo"></div>
      <button class="btn" onclick="start()">PLAY AGAIN</button>
      <button class="btn outline" onclick="share()">Share</button>
    </div>
  </div>
</div>

<script>
const COMPANY='Topgolf',GAME='Chip Shot',MAX_SHOTS=5;
const game=document.getElementById('game'),ball=document.getElementById('ball'),target=document.getElementById('target'),targetLabel=document.getElementById('targetLabel'),scoreEl=document.getElementById('score'),powerFill=document.getElementById('powerFill'),aimFill=document.getElementById('aimFill'),instrEl=document.getElementById('instr');
let W,H,score,running,stage,power,aim,animating,shotsLeft,targetX,targetY,raf;
// stage: 0=power, 1=aim, 2=flying
function resize(){W=innerWidth;H=innerHeight;placeTarget()}
function placeTarget(){
  const pts=[30,50,75,100][Math.floor(Math.random()*4)];
  targetLabel.textContent=pts+' PTS';target.dataset.pts=pts;
  const ringSize=pts>=100?60:pts>=75?70:pts>=50?80:100;
  target.querySelector('.target-ring').style.width=ringSize+'px';
  target.querySelector('.target-ring').style.height=ringSize+'px';
  targetX=W*.6+Math.random()*(W*.3);targetY=H*.15+Math.random()*(H*.25);
  target.style.left=(targetX-ringSize/2)+'px';target.style.top=(targetY-ringSize/2)+'px';
  target.dataset.size=ringSize;
}
addEventListener('resize',resize);resize();
function meterLoop(){
  if(!running||animating)return;
  if(stage===0){power=(power+1.5)%100;powerFill.style.width=power+'%'}
  else if(stage===1){aim=(aim+1.5)%100;aimFill.style.width=aim+'%'}
  raf=requestAnimationFrame(meterLoop);
}
function tap(){
  if(!running||animating)return;
  PAfx.play('click');
  if(stage===0){cancelAnimationFrame(raf);stage=1;raf=requestAnimationFrame(meterLoop);instrEl.textContent='TAP TO SET AIM'}
  else if(stage===1){cancelAnimationFrame(raf);stage=2;fire();instrEl.style.opacity=0}
}
game.addEventListener('click',tap);
function fire(){
  animating=true;
  PAfx.play('release');
  ball.style.display='block';
  const startX=55,startY=H-75;
  // Compute trajectory based on power and aim
  // aim 50 = perfect horizontal to target, deviate by offset
  const aimOff=(aim-50)/50; // -1..1
  const powerRatio=.5+power/100;
  const flightMs=800+power*8;
  const arcHeight=80+power*3;
  const targetSize=parseFloat(target.dataset.size);
  const tPts=parseInt(target.dataset.pts);
  // Destination: deviates from target based on aim accuracy
  const destX=targetX+aimOff*140*(1.5-powerRatio);
  const destY=targetY+aimOff*60+(power<30?100:power>90?-40:0);
  const s=performance.now();
  function fly(t){
    const p=Math.min(1,(t-s)/flightMs);
    const x=startX+(destX-startX)*p;
    const y=startY+(destY-startY)*p - arcHeight*Math.sin(p*Math.PI);
    const scale=1+Math.sin(p*Math.PI)*.5;
    ball.style.transform=`translate(${x}px,${y}px) scale(${scale})`;
    if(p<1)requestAnimationFrame(fly);
    else judge(destX,destY,tPts,targetSize);
  }
  requestAnimationFrame(fly);
}
function judge(x,y,tPts,tSize){
  const dx=x-targetX,dy=y-targetY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  let pts=0,label='MISS';
  if(dist<12){pts=tPts*2;label='BULLSEYE! +'+pts;PAfx.play('win');PAfx.burst(targetX,targetY,'#F47A20',24);PAfx.shake(300,5)}
  else if(dist<tSize/2){pts=tPts;label='HIT! +'+pts;PAfx.play('powerup');PAfx.burst(x,y,'#F47A20',14)}
  else if(dist<tSize){pts=Math.floor(tPts/2);label='EDGE +'+pts;PAfx.play('pop');PAfx.burst(x,y,'#1E5FC4',8)}
  else{PAfx.play('miss');PAfx.popup(x,y,'MISS','#aaa')}
  score+=pts;scoreEl.textContent=score;
  const b=document.createElement('div');b.className='burst';b.textContent=label;
  b.style.left=(x-60)+'px';b.style.top=(y-20)+'px';game.appendChild(b);
  setTimeout(()=>b.remove(),1200);
  shotsLeft--;
  setTimeout(()=>{
    ball.style.display='none';animating=false;
    if(shotsLeft<=0){end()}
    else{stage=0;power=0;aim=0;powerFill.style.width='0%';aimFill.style.width='0%';placeTarget();instrEl.style.opacity=1;instrEl.textContent='TAP TO SET POWER';raf=requestAnimationFrame(meterLoop)}
  },900);
}
function start(){
  document.getElementById('start').classList.add('hidden');
  document.getElementById('over').classList.add('hidden');
  score=0;scoreEl.textContent=0;shotsLeft=MAX_SHOTS;running=true;animating=false;
  stage=0;power=0;aim=0;powerFill.style.width='0%';aimFill.style.width='0%';
  placeTarget();instrEl.style.opacity=1;instrEl.textContent='TAP TO SET POWER';
  PAfx.play('start');
  raf=requestAnimationFrame(meterLoop);
}
function end(){
  running=false;
  PAfx.play(score>=250?'win':'gameover');
  document.getElementById('finalScore').textContent=score;
  const rank=score>=400?'🏆 PRO':score>=250?'🎯 SHARP SHOOTER':score>=100?'👍 SOLID':'🎮 KEEP SWINGING';
  document.getElementById('shotsInfo').textContent=`${MAX_SHOTS} shots · ${rank}`;
  document.getElementById('over').classList.remove('hidden');
}
function share(){
  const txt=`I scored ${score} in ${GAME} by ${COMPANY}! ⛳`;
  if(navigator.share)navigator.share({title:GAME,text:txt,url:location.href}).catch(()=>{});
  else{navigator.clipboard?.writeText(txt+' '+location.href);alert('Copied!')}
}
</script>
</body>
</html>
