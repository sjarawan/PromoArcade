<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Midnight Munch — Insomnia Cookies</title>
<meta name="description" content="Catch cookies in the moonlight. Hit the score target to unlock a late-night reward!"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--purple:#5B2A86;--purple-dark:#2D1249;--pink:#FF6FB5;--cream:#FFF5E1;--gold:#FFD166}
  html,body{height:100%;overflow:hidden;background:var(--purple-dark);font-family:'Inter',sans-serif;user-select:none;-webkit-user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent}
  #game{position:fixed;inset:0;overflow:hidden;background:radial-gradient(ellipse at 70% 20%,#8B4FB8 0%,#5B2A86 40%,#2D1249 100%)}
  .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.7;box-shadow:0 0 4px #fff}
  .moon{position:absolute;top:60px;right:30px;width:70px;height:70px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#FFF9E3,#FFD166);box-shadow:0 0 40px rgba(255,209,102,.4)}
  #hud{position:absolute;top:0;left:0;right:0;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;z-index:5;pointer-events:none}
  .brand{background:rgba(255,245,225,.95);padding:8px 16px;border-radius:20px;box-shadow:0 4px 14px rgba(0,0,0,.3)}
  .brand-name{font-family:'Righteous';font-size:14px;color:var(--purple);line-height:1;letter-spacing:1px}
  .brand-sub{font-size:9px;color:var(--pink);font-weight:700;letter-spacing:2px;margin-top:2px}
  .score-box{background:rgba(45,18,73,.7);backdrop-filter:blur(6px);color:var(--cream);padding:8px 18px;border-radius:20px;text-align:right;border:1px solid rgba(255,111,181,.3)}
  .score-lbl{font-size:9px;letter-spacing:2px;opacity:.7;line-height:1}
  .score-val{font-family:'Righteous';font-size:24px;color:var(--gold);line-height:1.1}
  #hands{position:absolute;bottom:30px;width:100px;height:50px;display:flex;align-items:center;justify-content:center;font-size:54px;will-change:left;filter:drop-shadow(0 4px 12px rgba(255,111,181,.4))}
  .cookie{position:absolute;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#C89860,#7A4B2A);box-shadow:0 0 20px rgba(255,209,102,.3),inset -3px -4px 6px rgba(0,0,0,.3);will-change:transform,top}
  .cookie::before{content:'';position:absolute;top:8px;left:8px;width:6px;height:6px;background:#3D2817;border-radius:50%;box-shadow:14px 4px 0 #3D2817,4px 18px 0 #3D2817,22px 20px 0 #3D2817}
  .cookie.pink{background:radial-gradient(circle at 35% 30%,#FFB8DC,#D4559A)}
  .cookie.pink::before{background:#6B2848;box-shadow:14px 4px 0 #6B2848,4px 18px 0 #6B2848,22px 20px 0 #6B2848}
  .screen{position:absolute;inset:0;background:rgba(45,18,73,.94);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:20;padding:20px}
  .screen.hidden{display:none}
  .panel{background:var(--cream);border-radius:20px;padding:32px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 2px var(--pink) inset}
  .tag{font-size:11px;letter-spacing:4px;color:var(--pink);font-weight:700;text-transform:uppercase}
  .title{font-family:'Righteous';font-size:36px;color:var(--purple);line-height:1;margin:6px 0 8px;letter-spacing:1px}
  .title em{font-style:normal;color:var(--pink)}
  .desc{font-size:14px;color:#5A3A7A;line-height:1.5;margin-bottom:22px}
  .btn{background:var(--purple);color:#fff;border:none;padding:14px 40px;border-radius:40px;font-family:'Righteous';font-size:16px;letter-spacing:1px;cursor:pointer;box-shadow:0 5px 16px rgba(91,42,134,.5);transition:transform .1s}
  .btn:active{transform:scale(.95)}
  .btn.outline{background:transparent;color:var(--purple);border:2px solid var(--purple);box-shadow:none;margin-top:10px;padding:10px 28px;font-size:13px}
  .final-score{font-family:'Righteous';font-size:72px;color:var(--pink);line-height:1}
  .final-lbl{font-size:10px;letter-spacing:3px;color:var(--purple);font-weight:700;margin:8px 0}
  .coupon{background:linear-gradient(135deg,var(--gold),#FFB347);border:2px dashed var(--purple);border-radius:14px;padding:16px;margin-bottom:16px}
  .coupon-title{font-size:11px;letter-spacing:2px;color:var(--purple);font-weight:700;text-transform:uppercase;margin-bottom:6px}
  .coupon-code{font-family:'Righteous';font-size:22px;color:var(--purple-dark);letter-spacing:3px}
  .coupon-sub{font-size:11px;color:var(--purple);margin-top:4px;font-weight:700}
  .logo-slot{width:72px;height:72px;background:linear-gradient(135deg,var(--purple),var(--pink));border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 0 30px rgba(255,111,181,.4)}
</style>
<script src="fx.js" defer></script>
</head>
<body>
<div id="game">
  <div class="moon"></div>
  <div id="hud">
    <div class="brand">
      <div class="brand-name">INSOMNIA</div>
      <div class="brand-sub">COOKIES</div>
    </div>
    <div class="score-box">
      <div class="score-lbl">CAUGHT</div>
      <div class="score-val" id="score">0</div>
    </div>
  </div>
  <div id="hands">🤲</div>

  <div class="screen" id="start">
    <div class="panel">
      <!-- LOGO SLOT: Replace with <img src="../assets/logos/insomnia.png"> -->
      <div class="logo-slot">🌙</div>
      <div class="tag">INSOMNIA COOKIES</div>
      <h1 class="title">Midnight <em>Munch</em></h1>
      <p class="desc">The cookies are delivered fresh — right out of the moon! Catch <b>25 cookies</b> before dawn to unlock a late-night reward.</p>
      <button class="btn" onclick="start()">START MUNCHING</button>
    </div>
  </div>

  <div class="screen hidden" id="over">
    <div class="panel">
      <div class="final-lbl">COOKIES CAUGHT</div>
      <div class="final-score" id="finalScore">0</div>
      <div id="rewardArea"></div>
      <button class="btn" onclick="start()">Again</button>
      <button class="btn outline" onclick="share()">Share</button>
    </div>
  </div>
</div>

<script>
const COMPANY='Insomnia Cookies',GAME='Midnight Munch',TARGET=25,COUPON='LATE25';
const game=document.getElementById('game'),hands=document.getElementById('hands'),scoreEl=document.getElementById('score');
let W,H,hx,score,running,items=[],spawnT,lives,lastT,raf;
function resize(){W=innerWidth;H=innerHeight;hands.style.left=(hx||W/2-50)+'px'}
function makeStars(){for(let i=0;i<40;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*70+'%';s.style.animation=`twinkle ${2+Math.random()*3}s infinite`;game.appendChild(s)}}
addEventListener('resize',resize);resize();makeStars();
function move(x){hx=Math.max(0,Math.min(W-100,x-50));hands.style.left=hx+'px'}
addEventListener('mousemove',e=>running&&move(e.clientX));
addEventListener('touchmove',e=>{if(running&&e.touches[0]){e.preventDefault();move(e.touches[0].clientX)}},{passive:false});
function spawn(){
  const c=document.createElement('div');c.className='cookie'+(Math.random()<.3?' pink':'');
  c.x=Math.random()*(W-40);c.y=-40;c.vy=2.8+Math.random()*2+score*.04;
  c.style.transform=`translate(${c.x}px,${c.y}px)`;game.appendChild(c);items.push(c);
}
function loop(t){
  if(!running)return;
  const dt=Math.min(32,t-lastT);lastT=t;
  spawnT+=dt;if(spawnT>Math.max(500-score*5,240)){spawnT=0;spawn()}
  for(let i=items.length-1;i>=0;i--){
    const c=items[i];c.y+=c.vy*(dt/16);
    c.style.transform=`translate(${c.x}px,${c.y}px) rotate(${c.y*.5}deg)`;
    if(c.y>H-80&&c.y<H-30&&c.x+40>hx+10&&c.x<hx+90){
      score++;scoreEl.textContent=score;
      PAfx.play(score%8===0?'powerup':'coin');
      PAfx.burst(c.x+20,c.y+20,c.classList.contains('pink')?'#FF69B4':'#FFD700',9);
      PAfx.popup(c.x+20,c.y,'+1','#FFD166');
      c.remove();items.splice(i,1);
    }else if(c.y>H){
      c.remove();items.splice(i,1);lives--;
      PAfx.play('miss');PAfx.shake(220,5);
      if(lives<=0)end();
    }
  }
  raf=requestAnimationFrame(loop);
}
function start(){
  document.getElementById('start').classList.add('hidden');
  document.getElementById('over').classList.add('hidden');
  items.forEach(c=>c.remove());items=[];
  score=0;scoreEl.textContent=0;lives=5;running=true;spawnT=0;lastT=performance.now();
  PAfx.play('start');
  raf=requestAnimationFrame(loop);
}
function end(){
  running=false;cancelAnimationFrame(raf);
  document.getElementById('finalScore').textContent=score;
  const r=document.getElementById('rewardArea');
  if(score>=TARGET){
    PAfx.play('win');
    setTimeout(()=>PAfx.burst(innerWidth/2,innerHeight/2,'#FFD166',24),150);
    r.innerHTML=`<div class="coupon"><div class="coupon-title">🌙 LATE-NIGHT REWARD</div><div class="coupon-code">${COUPON}</div><div class="coupon-sub">25% OFF YOUR NEXT DELIVERY</div></div>`;
  }else{
    PAfx.play('gameover');
    r.innerHTML=`<p style="font-size:13px;color:#5A3A7A;margin-bottom:16px;">Catch <b>${TARGET} cookies</b> to unlock a reward!</p>`;
  }
  document.getElementById('over').classList.remove('hidden');
}
function share(){
  const txt=`I caught ${score} cookies in ${GAME} by ${COMPANY}! 🌙🍪`;
  if(navigator.share)navigator.share({title:GAME,text:txt,url:location.href}).catch(()=>{});
  else{navigator.clipboard?.writeText(txt+' '+location.href);alert('Copied!')}
}
</script>
</body>
</html>
